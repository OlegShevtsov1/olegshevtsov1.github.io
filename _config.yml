achievements:
  uk:
    <p>Я займаюсь розробкою на Ruby on Rails 1 рік та 6 місяців, і за цей час я створив 5 власних проекти, 4 з них викладені в публичному репозиторії, а один знаходиться у приватному репозиторії GitLab.
    Окрім того, я приймав участь в командній роботі. Це 4 проекта, що знаходятся в приватному репозиторії, а сайти завернуто в продакшн.
    Посилання на публичні репозиторії, а також сайти на продакшн можна знайти в моєму CV - розділ <a href="#projects">Проекти.</a></p>
  ru:
    <p>Я занимаюсь разработкой на Ruby on Rails 1 год и 6 месяцев, и за это время я создал 5 собственных проекта, 5 из которых выложены в публичном репозитории а один находится в приватном репозитории GitLab.
    Кроме того, я учавствовал в командной работе. Это 4 проекта, которые находятся в приватном репозитории, а сайты завернуты в продакшн.
    Ссылки на публичные репозитории, а так же сайты на продакшн можна найти в моем CV - раздел <a href="#projects">Проекты.</a></p>
  en:
    <p>I have been developing on Ruby on Rails for 1 year and 6 months, and during this time I created 5 of my own projects, 5 of which are posted in a public repository and one is in a private GitLab repository.</p>
    <p>Furthermore, I participated in teamwork. These are 4 projects that are in a private repository, and sites are hosted in production.
    Links to public repositories, as well as production sites can be found in my CV - section <a href="#projects">Projects.</a></p>

about_myself:
  uk:
    <h5>Відношення до роботи</h5>
    <p>Я вибудовую конструктивні відношення в работі. Де в першу чергу присутні порядок та послідовність дій. Стараюсь створювати  умови, де повсякденна работа буде зводитися до виконання простих чітких задач , висуваючи їх на перший план повсякденних обов'язків.</p>
    <p>На більш складні задачі, по яким є невирішені питання, відводжу більшу частину часу. Що дозволяє в комфортні строки обдумати можливі шляхи вирішення для досягнення оптимального результату.
    Я використовую в своїй работі технологію <a href="https://www.youtube.com/watch?v=BHhr1aMgKPk" alt="SCRUM">SCRUM</a>, вважаю ще це  дозволяє найбільш ефективно планувати робочий процесс. Завдяки чому мої дії стають організованими та сфокусованими на результат.</p>

    <h5>Работа в команді</h5>
    <p>Безсумнівно моєю сильной стороною є работа в команді. Коли команда синхронно працює над проектом, думає говорить  і робить одне й те саме погоджує власні слова із своїми переконаннями. Сили потроюються.</p>
    <p>Вважаю що одним із найкращих способів колективно вирішити труднощі поставленої задачі це описати невирішене питання максимально зрозуміло, вказати які шляхи вирішення уже робилися. Розподілення ролей в команді  це ключ до ефективного вирішення труднощей.  Переконаний що сильні сторони кажного члена команди для призначения ролі, найкраще визначити в момент пошуку рішень для важких задач. Завжди приймаю участь в таких задачах. </p>
    <h5>Саморозвиток</h5>
    <p>Організував самонавчання максимально комфортно. Нотатки про любу інформацію що коли  небудь  була опрацьована і зрозуміла завжди під рукою.</p>
    <p>Мені подобається, коли використовуючи в схемі проекту вірні налаштування,  виникають помилки, що спонукають писати ще більш правильніший код.</p>
    <h5>Хобі</h5>
    <p>Читаю книги, дивлюсь фільми, фантастику. Займаюсь спортом, здорове харчування, облаштовую дачу.<br> Граю в шахи <a href="https://www.chess.com/member/olegshevtsov1">chess.com/member/olegshevtsov1</a></p>
    <h5>Відео що подобаються</h5>
    <ul style="list-style-type:none;">
    <li><a href="https://www.youtube.com/watch?v=Pl8OlkkwRpc"> How the blockchain is changing money and business | Don Tapscott | TED Channel </a></li>
    <li><a href="https://www.youtube.com/watch?v=0MKOrDGVdNI">Алексей Мышкин - Розкрию своє серце навстіж.</a></li>
    </ul>
  ru:
    <h5>Отношение к работе</h5>
    <p>Я выстраиваю конструктивные отношения в работе. Где в первую очередь присутствует порядок и последовательность действий. Стараюсь создавать условия, где повседневная работа будет сводиться к выполнению
    простых четких задач, выдвигая их на первый план повседневных обязанностей.</p>
    <p>На более сложные задачи, по которым есть нерешенные вопросы, отвожу большее количество времени. Что позволяет в комфортные сроки обдумать возможные пути решения для достижения оптимального результата.
    Я исспользую в своей работе технологию <a href="https://www.youtube.com/watch?v=BHhr1aMgKPk" alt="SCRUM">SCRUM</a>, считаю что это позволяет более ефективно планировать рабочий процесс.
    Благодаря чему мои действия становятся организованными и сфокусированными на результат.</p>
    <h5>Работа в команде</h5>
    <p>Несомненно моей сильной стороной является работа в команде. Когда команда синхронно работает над проектом, думает говорит и делает одно и тоже, согласовывает свои слова со своими убеждениями. Силы утраиваются.</p>
    <p>Считаю что одним из лучших способов колективно решить трудности поставленной задачи это описать нерешенный вопрос максимально понятно, указать какие пути решения уже предпринимались. Распределение ролей в команде
    это ключ к ефективному решению трудностей. Убежден что сильные стороны каждого члена команды для назначения роли, лучше всего определить в момент поиска решений для трудных задач. Всегда принимаю участие в таких задачах. </p>
    <h5>Саморазвитие</h5>
    <p>Организовал самообучение максимально комфортно. Заметка о любой информации которая когда либо  была обработана и понята всегда по рукой.</p>
